model_list:
  - model_name: k3
    litellm_params:
      model: openai/k3
      api_base: os.environ/KIMI_OAUTH_FORWARD_BASE_URL
      api_key: os.environ/KIMI_INTERNAL_KEY
      use_chat_completions_api: true

  - model_name: kimi-api-k3
    litellm_params:
      model: openai/kimi-k3
      api_base: os.environ/KIMI_API_FORWARD_BASE_URL
      api_key: os.environ/KIMI_INTERNAL_KEY
      use_chat_completions_api: true

litellm_settings:
  drop_params: true
  request_timeout: 600

general_settings:
  disable_spend_logs: true
